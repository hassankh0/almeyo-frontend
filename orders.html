            .order-menu-item-quantity {

                align-items: center;
                gap: 8px;

            .qty-btn {

            .qty-btn:hover {

            .qty-input {
                width: 45px;

                border: 1px solid #ddd;
                border-radius: 3px;
                padding: 5px;
                font-size: 14px;
            }
            .add-to-cart-btn {
                padding: 6px 12px;
                background: #d4a574;
                color: white;
                border: none;
                border-radius: 3px;
                cursor: pointer;
                font-weight: 600;
                font-size: 12px;
                transition: all 0.3s ease;
                margin-left: auto;
            }
            .add-to-cart-btn:hover {
                background: #a67c52;
            }
            .orders-container {
                display: flex;
                gap: 30px;
            }
            .orders-menu-section {
                flex: 1;
            }
            .orders-sidebar {
                width: 350px;
            }
            .cart-section {
                background: #f9f9f9;
                border-radius: 8px;
                padding: 20px;
                border: 1px solid #eee;
                position: sticky;
                top: 20px;
            }
            .cart-items {
                margin-bottom: 20px;
                max-height: 400px;
                overflow-y: auto;
            }
            .cart-item {
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                padding: 10px 0;
                border-bottom: 1px solid #ddd;
                font-size: 14px;
            }
            .cart-item:last-child {
                border-bottom: none;
            }
            .cart-item-details {
                flex: 1;
            }
            .cart-item-name {
                font-weight: 600;
                color: #2d2d2d;
            }
            .cart-item-qty {
                color: #999;
                font-size: 12px;
            }
            .cart-item-remove {
                color: #d4a574;
                cursor: pointer;
                font-size: 12px;
                text-decoration: underline;
                margin-left: 10px;
            }
            .cart-item-price {
                color: #d4a574;
                font-weight: 600;
                text-align: right;
                min-width: 50px;
            }
            .cart-total {
                text-align: right;
                padding-top: 15px;
                border-top: 2px solid #d4a574;
                margin-top: 15px;
            }
            .cart-total-label {
                font-size: 14px;
                color: #666;
                margin-bottom: 5px;
            }
            .cart-total-amount {
                font-size: 22px;
                font-weight: bold;
                color: #d4a574;
            }
            .empty-cart {
                text-align: center;
                padding: 30px 10px;
                color: #999;
                font-size: 14px;
            }
            .order-form-section {
                background: white;
                border-radius: 8px;
                padding: 20px;
                margin-top: 20px;
                border: 1px solid #eee;
            }
            .order-form-section h4 {
                font-weight: 600;
                margin-bottom: 15px;
                color: #2d2d2d;
            }
            .form-group {
                margin-bottom: 12px;
            }
            .form-group label {
                font-size: 12px;
                font-weight: 600;
                color: #2d2d2d;
                margin-bottom: 5px;
                display: block;
            }
            .form_control {
                width: 100%;
                padding: 8px 12px;
                border: 1px solid #ddd;
                border-radius: 3px;
                font-size: 13px;
            }
            .order-form-section .theme-btn {
                width: 100%;
                padding: 10px !important;
                font-size: 14px;
                margin-top: 10px;

        <!--====== Orders Page Script ======-->
        <script>
            let cart = {};

            document.addEventListener('DOMContentLoaded', function() {
                setupOrderForm();
            });


            function increaseQty(itemId) {
                const input = document.getElementById(`qty-${itemId}`);
                input.value = parseInt(input.value) + 1;
            }

            function decreaseQty(itemId) {
                const input = document.getElementById(`qty-${itemId}`);
                if (parseInt(input.value) > 0) {
                    input.value = parseInt(input.value) - 1;
                }
            }

            function addToCart(itemId, name, price) {
                const qty = parseInt(document.getElementById(`qty-${itemId}`).value);
                
                if (qty === 0) {
                    alert('Veuillez sélectionner une quantité');
                    return;
                }

                const key = `item-${itemId}`;
                if (cart[key]) {
                    cart[key].quantity += qty;
                } else {
                    cart[key] = { name, price, quantity: qty, itemId };
                }

                document.getElementById(`qty-${itemId}`).value = 0;
                updateCart();
            }

            function updateCart() {
                const container = document.getElementById('cart-items-container');
                let total = 0;
                let html = '';

                if (Object.keys(cart).length === 0) {
                    html = '<div class="empty-cart">Votre panier est vide</div>';
                } else {
                    Object.keys(cart).forEach(key => {
                        const item = cart[key];
                        const itemTotal = item.price * item.quantity;
                        total += itemTotal;
                        
                        html += `
                            <div class="cart-item">
                                <div class="cart-item-details">
                                    <div class="cart-item-name">${item.name}</div>
                                    <div class="cart-item-qty">Qty: ${item.quantity}</div>
                                </div>
                                <div class="cart-item-price">${itemTotal.toFixed(2)}€</div>
                                <span class="cart-item-remove" onclick="removeFromCart('${key}')">✕</span>
                            </div>
                        `;
                    });
                }

                container.innerHTML = html;
                document.getElementById('cart-total').textContent = total.toFixed(2) + ' €';
            }

            function removeFromCart(key) {
                delete cart[key];
                updateCart();
            }

            function setupOrderForm() {
                const submitBtn = document.getElementById('submitOrder');
                const form = document.getElementById('orderForm');
                const dateInput = document.getElementById('pickupDate');
                const dateError = document.getElementById('dateError');

                // Set minimum date to today
                if (dateInput) {
                    const today = new Date().toISOString().split('T')[0];
                    dateInput.min = today;

                    // Validate date - block Sundays
                    dateInput.addEventListener('change', function(e) {
                        const selectedDate = new Date(this.value + 'T00:00:00');
                        const dayOfWeek = selectedDate.getDay();

                        if (dayOfWeek === 0) { // Sunday = 0
                            dateError.textContent = 'Le restaurant est fermé le dimanche.';
                            dateError.style.display = 'block';
                            this.value = '';
                            
                            // Hide error after 5 seconds
                            setTimeout(() => {
                                dateError.style.display = 'none';
                            }, 5000);
                        } else {
                            // Valid date selected
                            dateError.style.display = 'none';
                        }
                    });
                }

                if (submitBtn && form) {
                    submitBtn.addEventListener('click', async function(e) {
                        e.preventDefault();

                        if (Object.keys(cart).length === 0) {
                            alert('Votre panier est vide! Ajoutez des articles avant de commander.');
                            return;
                        }

                        if (!form.checkValidity()) {
                            form.reportValidity();
                            return;
                        }

                        const orderItems = [];
                        let totalPrice = 0;
                        Object.keys(cart).forEach(key => {
                            const item = cart[key];
                            const itemTotal = item.price * item.quantity;
                            orderItems.push({
                                id: item.itemId,
                                name: item.name,
                                price: item.price,
                                quantity: item.quantity,
                                subtotal: itemTotal
                            });
                            totalPrice += itemTotal;
                        });

                        const orderData = {
                            customer: {
                                fullName: form.querySelector('input[name="fullName"]').value,
                                email: form.querySelector('input[name="email"]').value,
                                phone: form.querySelector('input[name="phone"]').value
                            },
                            pickup: {
                                date: form.querySelector('input[name="pickupDate"]').value,
                                time: form.querySelector('select[name="pickupTime"]').value
                            },
                            items: orderItems,
                            totalPrice: totalPrice,
                            notes: form.querySelector('textarea[name="notes"]').value,
                            orderDate: new Date().toISOString()
                        };

                        const originalText = submitBtn.textContent;
                        submitBtn.textContent = 'Traitement...';
                        submitBtn.disabled = true;

                        try {
                            const response = await fetch('https://votre-api.com/api/orders', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json',
                                },
                                body: JSON.stringify(orderData)
                            });

                            if (response.ok) {
                                const result = await response.json();
                                alert('Commande passée avec succès! Numéro: ' + (result.orderId || 'EN ATTENTE'));
                                cart = {};
                                updateCart();
                                form.reset();
                            } else {
                                alert('Erreur lors de la validation. Veuillez réessayer.');
                            }
                        } catch (error) {
                            console.error('Erreur:', error);
                            alert('Erreur de connexion. Vérifiez votre connexion internet.');
                        } finally {
                            submitBtn.textContent = originalText;
                            submitBtn.disabled = false;
                        }
                    });
                }
            }

            window.addEventListener('load', function() {
                if (window.AOS) {
                    AOS.refresh();
                }
            });
        </script>
